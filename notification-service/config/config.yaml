env: development

http_server:
  host: "localhost"
  port: "8081"
  read_header_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s

database:
  host: "localhost"
  port: "5432"
  username: "postgres"
  db_name: "hookah_notifications"
  ssl_mode: "disable"

kafka:
  brokers:
    - "localhost:9092"
  required_acks: -1
  async: false
