services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${postgres_password}
      POSTGRES_DB: hookah_users
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  user-service:
    build: .
    network_mode: "host"
    environment:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_NAME: hookah_users
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
